services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Garima@123}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "${AUTH_HOST_PORT:-8085}:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Garima@123}
      JWT_SECRET: ${JWT_SECRET:-o3zRbRLwQm4gwsueqP2s2PLxKpPOgZX8y6q8AZNFMl4=}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    container_name: customer-service
    ports:
      - "${CUSTOMER_HOST_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Garima@123}
      JWT_SECRET: ${JWT_SECRET:-o3zRbRLwQm4gwsueqP2s2PLxKpPOgZX8y6q8AZNFMl4=}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "${PRODUCT_HOST_PORT:-8083}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Garima@123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "${ORDER_HOST_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Garima@123}
    depends_on:
      postgres:
        condition: service_healthy
      customer-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: always

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "${PAYMENT_HOST_PORT:-8084}:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Garima@123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  api-gateway:
    build:
      context: .
      dockerfile: apiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-9090}:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-o3zRbRLwQm4gwsueqP2s2PLxKpPOgZX8y6q8AZNFMl4=}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
    depends_on:
      auth-service:
        condition: service_started
      customer-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    restart: always

volumes:
  postgres-data:
