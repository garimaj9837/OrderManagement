server:
  port: 9090

spring:
  cloud:
    gateway:
      routes:

        - id: customer-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1