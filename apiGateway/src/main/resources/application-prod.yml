server:
  port: ${SERVER_PORT:9090}

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${FRONTEND_ORIGIN}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URI}
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: ${ORDER_SERVICE_URI}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: ${PRODUCT_SERVICE_URI}
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: ${AUTH_SERVICE_URI}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
