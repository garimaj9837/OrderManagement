server:
  port: 9090

jwt:
  secret: o3zRbRLwQm4gwsueqP2s2PLxKpPOgZX8y6q8AZNFMl4=

spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:

        - id: customer-service
          uri: http://customer-service:8080
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: http://product-service:8083
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://auth-service:8085
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
