server:
  port: ${PORT:9090}

jwt:
  secret: ${JWT_SECRET:o3zRbRLwQm4gwsueqP2s2PLxKpPOgZX8y6q8AZNFMl4=}

spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${FRONTEND_ORIGIN:http://localhost:4200}"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URI:http://customer-service:8080}
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://order-service:8081}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://product-service:8083}
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://auth-service:8085}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://payment-service:8084}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
